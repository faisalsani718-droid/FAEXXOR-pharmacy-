<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
</head>
<body>

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA4wFDi07KAqB-mpsptldFVhPK0-RWvD4c",
  authDomain: "faexxor-pharmacy.firebaseapp.com",
  projectId: "faexxor-pharmacy",
  storageBucket: "faexxor-pharmacy.firebasestorage.app",
  messagingSenderId: "240852328687",
  appId: "1:240852328687:web:d0602cfd0a4b392e88fb1a"
};

firebase.initializeApp(firebaseConfig);

function adminLogin() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    firebase.auth()
      .signInWithEmailAndPassword(email, password)
      .then(() => {
          window.location.href = "admin-dashboard.html";
      })
      .catch(error => {
          alert(error.message);
      });
}
</script>

</body>
</html>
